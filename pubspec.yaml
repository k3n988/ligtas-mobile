name: ligtas
description: A new Flutter project
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '^3.11.0'

dependencies:
  flutter:
    sdk: flutter

  # State management / MVVM
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # Local database (offline-first backbone)
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0

  # Networking
  dio: ^5.4.3
  pretty_dio_logger: ^1.3.1

  # Mapping
  google_maps_flutter: ^2.9.0
  google_maps_flutter_android: ^2.14.0
  google_maps_flutter_platform_interface: ^2.9.0

  # Mesh / BLE (wire up later, declare now)
  flutter_blue_plus: ^1.32.12

  # Secure storage
  flutter_secure_storage: ^9.0.0

  # Utilities
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  get_it: ^7.7.0
  injectable: ^2.4.2
  equatable: ^2.0.5
  dartz: ^0.10.1
  uuid: 4.5.3        # ✅ Added UUID here

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.9
  drift_dev: ^2.18.0
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  injectable_generator: ^2.4.2
  riverpod_generator: ^2.4.0
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true